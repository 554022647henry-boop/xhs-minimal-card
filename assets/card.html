<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>小红书卡片</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      background: #fff;
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .card {
      width: 1080px;
      height: 1440px;
      background: #fff;
      padding: 80px 84px 72px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      font-size: 24px;
      font-weight: 400;
      color: #c0c0c0;
      letter-spacing: 0.04em;
      margin-bottom: 56px;
      flex-shrink: 0;
    }

    /* 内容窗口：固定高度，溢出隐藏，通过 translateY 移动内容 */
    .content-window {
      flex: 1;
      overflow: hidden;
    }

    .content-scroll {
      transform: translateY({{OFFSET}}px);
    }

    .body {
      font-size: 32px;
      color: #1a1a1a;
      line-height: 1.9;
      font-weight: 400;
    }

    .body p {
      margin-bottom: 36px;
    }

    .body p:last-child {
      margin-bottom: 0;
    }

    .body strong {
      font-weight: 700;
      color: #111;
    }

    .page-num {
      margin-top: 40px;
      font-size: 26px;
      color: #ddd;
      font-weight: 300;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">{{BRAND}}</div>
    <div class="content-window">
      <div class="content-scroll">
        <div class="body">{{CONTENT}}</div>
      </div>
    </div>
    <div class="page-num">{{PAGE}}</div>
  </div>
</body>
</html>
